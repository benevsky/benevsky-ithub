// ── API ──────────────────────────────────────────────────────────────────────
async function apiChat(p) {
  const r = await fetch(`${RAG_API_URL}/chat`, {
    method:'POST', headers:{'Content-Type':'application/json','X-Api-Key':API_KEY},
    body: JSON.stringify({ query:p.query, client_id:p.clientId, client_name:p.clientName,
      segment:p.segment, churn_score:p.churnScore, task_type:p.taskType||'general',
      history:(p.history||[]).map(m=>({role:m.role,content:m.content})) }),
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.detail||r.statusText); }
  return r.json();
}

const fmt = n => n?.toLocaleString('ru-KZ');

// ── Toast ────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, set] = useState([]);
  const add = useCallback((msg, type='success') => {
    const id = Date.now();
    set(p=>[...p,{id,msg,type}]);
    setTimeout(()=>set(p=>p.filter(t=>t.id!==id)),4000);
  },[]);
  const rm = useCallback(id=>set(p=>p.filter(t=>t.id!==id)),[]);
  return { toasts, toast:add, rm };
}
function Toasts({ toasts, rm }) {
  return (
    <div className="fixed top-4 right-4 z-[200] space-y-2">
      {toasts.map(t=>(
        <div key={t.id} className={`flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium text-white ${t.type==='error'?'bg-red-500':'bg-green-500'}`}>
          {t.msg}
          <button onClick={()=>rm(t.id)} className="ml-2 opacity-70 hover:opacity-100">✕</button>
        </div>
      ))}
    </div>
  );
}

// ── Markdown ─────────────────────────────────────────────────────────────────
function MD({ text }) {
  const html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^#{3}\s(.+)$/gm,'<h3 class="font-semibold text-sm mt-2 mb-1">$1</h3>')
    .replace(/^#{2}\s(.+)$/gm,'<h2 class="font-bold text-sm mt-3 mb-1">$1</h2>')
    .replace(/^[-•]\s(.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,s=>`<ul class="pl-4 list-disc my-1">${s}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br/>');
  return <div className="prose text-sm leading-relaxed" dangerouslySetInnerHTML={{__html:`<p>${html}</p>`}} />;
}

                {s==='active'?`Активные (${pendingCount})`:`Выполнено (${doneCount})`}
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-1.5">
          {[['all','Все'],['reactivation','Реактивация'],['upsell','Апселл'],['analysis','Анализ'],['inventory','Остатки'],['general','Общее']].map(([v,l])=>(
            <button key={v} onClick={()=>setTypeFilter(v)}
              className={`px-3 py-1 text-xs font-medium rounded-lg transition-colors ${typeFilter===v?'bg-gray-800 text-white':'text-gray-500 hover:bg-gray-100'}`}>
              {v!=='all' && <span className="mr-1">{TYPE[v]?.icon}</span>}{l}
            </button>
          ))}
        </div>
      </header>

      <div className="flex-1 overflow-y-auto px-6 py-4 space-y-2.5">
        {filtered.length===0 && (
          <div className="text-center py-20 text-gray-400">
            <div className="text-5xl mb-3">🎉</div>
            <p className="font-medium">Все задачи выполнены!</p>
          </div>
        )}
        {filtered.map(task => {
          const c = clientById[task.clientId];
          const ch = c ? churnMeta(c.churn) : null;
          const tt = TYPE[task.type];
          const pp = PRI[task.pri];
          const st = getStatus(task);
          return (
            <div key={task.id} className={`bg-white border rounded-xl p-4 flex gap-4 hover:shadow-sm transition-shadow ${task.pri==='high'&&st!=='done'?'border-orange-200':'border-gray-200'}`}>
              {/* Priority dot */}
              <div className="pt-1 shrink-0">
                <div className={`w-2.5 h-2.5 rounded-full ${pp?.dot}`}/>
              </div>
              {/* Content */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap mb-1">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${tt?.cls}`}>{tt?.icon} {tt?.label}</span>
                  {c && <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${SEG[c.seg]?.cls}`}>{c.seg}</span>}
                  {task.pri==='high' && st!=='done' && <span className="text-xs text-red-500 font-medium">🔴 Срочно</span>}
                  <span className="text-xs text-gray-400 ml-auto">до {task.due}</span>
                </div>
                {c && <button onClick={()=>onViewClient(c)} className="text-xs text-brand-600 hover:underline mb-1 font-medium text-left">{c.name}</button>}
                <p className="text-sm font-semibold text-gray-900 mb-1">{task.title}</p>
                <p className="text-xs text-gray-500 leading-relaxed line-clamp-2">{task.desc}</p>
                {c && c.churn>0.6 && <div className="mt-2 text-xs text-orange-700 bg-orange-50 rounded px-2 py-1">⚠️ Churn {Math.round(c.churn*100)}% · {c.days} дн. без заказа</div>}
              </div>
              {/* Actions */}
              <div className="shrink-0 flex flex-col gap-1.5 items-end">
                {st!=='done' ? (
                  <>
                    <button onClick={()=>{ onOpenClient(c); }}
                      className="px-3 py-1.5 text-xs font-medium text-brand-600 border border-brand-200 rounded-lg hover:bg-brand-500 hover:text-white transition-colors whitespace-nowrap">
                      Открыть в чате →
                    </button>
                    <button onClick={()=>setStatus(task.id,'done')}
                      className="px-3 py-1.5 text-xs font-medium text-green-600 border border-green-200 rounded-lg hover:bg-green-500 hover:text-white transition-colors">
                      ✓ Выполнено
                    </button>
                    {st==='pending' && (
                      <button onClick={()=>setStatus(task.id,'in_progress')}
                        className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 transition-colors">
                        В работу
                      </button>
                    )}
                    {!isClaimed(task.id) ? (
                      <button onClick={()=>claimTask(task.id)}
                        className="px-3 py-1.5 text-xs font-medium text-purple-600 border border-purple-200 rounded-lg hover:bg-purple-500 hover:text-white transition-colors">
                        + В мои задачи
                      </button>
                    ) : (
                      <span className="text-xs text-green-600 font-medium px-1">✓ В моих</span>
                    )}
                  </>
                ) : (
                  <button onClick={()=>setStatus(task.id,'pending')}
                    className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                    Вернуть
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Goals Page ───────────────────────────────────────────────────────────────
function GoalsPage() {
  const [goals, setGoals] = useState(WEEKLY_GOALS);
  const week = 'Неделя 22–28 мая 2026';

  const update = (id, delta) => {
    setGoals(gs => gs.map(g => {
      if(g.id!==id) return g;
      const nv = Math.max(0, Math.min(g.target, g.current+delta));
      return {...g, current: nv};
    }));
  };

  const fmtVal = (g) => g.fmt==='money' ? `${fmtM(g.current)} ₸` : `${g.current} ${g.unit}`;
  const fmtTgt = (g) => g.fmt==='money' ? `${fmtM(g.target)} ₸` : `${g.target} ${g.unit}`;
  const totalDone = goals.filter(g=>g.current>=g.target).length;

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      <header className="shrink-0 px-6 py-4 bg-white border-b border-gray-100">
        <h1 className="text-lg font-bold">Цели на неделю</h1>
        <p className="text-xs text-gray-400">{week} · {totalDone} из {goals.length} целей достигнуто</p>
      </header>
      <div className="flex-1 overflow-y-auto px-6 py-5">
        <div className="max-w-2xl space-y-4">
          {goals.map(g=>{
            const pct = Math.min(100, Math.round(g.current/g.target*100));
            const done = g.current>=g.target;
            return (
              <div key={g.id} className={`bg-white border rounded-xl p-5 transition-all ${done?'border-green-300 bg-green-50/30':'border-gray-200'}`}>
                <div className="flex items-start justify-between mb-3">
                  <div className="flex items-center gap-2.5">
                    <span className="text-2xl">{g.emoji}</span>
                    <div>
                      <p className="font-semibold text-gray-900">{g.title}</p>
                      <p className="text-xs text-gray-400">{fmtVal(g)} из {fmtTgt(g)}</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
                    {done ? (
                      <span className="text-xs font-bold text-green-700 bg-green-100 px-3 py-1.5 rounded-lg">✅ Достигнуто</span>
                    ) : (
                      <span className="text-xs font-bold text-gray-700 bg-gray-100 px-3 py-1.5 rounded-lg">{pct}%</span>
                    )}
                    <div className="flex gap-1">
                      <button onClick={()=>update(g.id,-1)}
                        className="w-7 h-7 flex items-center justify-center border border-gray-200 rounded-lg hover:bg-gray-100 text-gray-500 text-sm transition-colors">−</button>
                      <button onClick={()=>update(g.id,1)}
                        className="w-7 h-7 flex items-center justify-center bg-brand-500 hover:bg-brand-600 text-white rounded-lg text-sm transition-colors">+</button>
                    </div>
                  </div>
                </div>
                <div className="h-2.5 bg-gray-100 rounded-full overflow-hidden">
                  <div className={`h-full rounded-full progress-bar ${done?'bg-green-500':'bg-brand-500'}`} style={{width:`${pct}%`}}/>
                </div>
              </div>
            );
          })}

          {/* Summary */}
          <div className="bg-white border border-gray-200 rounded-xl p-5">
            <p className="text-sm font-semibold mb-3">Итог недели</p>
            <div className="grid grid-cols-3 gap-3">
              {[
                { l:'Целей достигнуто', v:`${totalDone}/${goals.length}`, cls:'text-brand-600' },
                { l:'Общий прогресс',   v:`${Math.round(goals.reduce((s,g)=>s+Math.min(100,g.current/g.target*100),0)/goals.length)}%`, cls:'text-gray-800' },
                { l:'До конца недели',  v:'3 дня', cls:'text-gray-500' },
              ].map(({l,v,cls})=>(
                <div key={l} className="bg-gray-50 rounded-lg p-3 text-center">
                  <p className={`text-xl font-bold ${cls}`}>{v}</p>
                  <p className="text-xs text-gray-400 mt-0.5">{l}</p>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    finally { setBusy(false); }

              <div>
                <p className="font-medium">{health?'Подключено':'Нет подключения'}</p>

// ── My Tasks Page ─────────────────────────────────────────────────────────────
function MyTasksPage({ onOpenClient, onViewClient, taskStatuses, setTaskStatuses, myTaskIds, setMyTaskIds }) {
  const [statusTab, setStatusTab] = useState('active');
  const [typeFilter, setTypeFilter] = useState('all');

  const getStatus = (t) => taskStatuses[t.id] ?? t.status;
  const setStatus = (id, s) => setTaskStatuses(p=>({...p,[id]:s}));
  const unclaim = (id) => setMyTaskIds(prev => { const n = new Set(prev); n.delete(id); return n; });

  const myTasks = useMemo(()=> TASKS.filter(t => myTaskIds.has(t.id)), [myTaskIds]);
  const filtered = useMemo(()=> {
    return myTasks.filter(t => {
      const st = getStatus(t);
      const statusMatch = statusTab==='active' ? st!=='done' : st==='done';
      const typeMatch = typeFilter==='all' || t.type===typeFilter;
      return statusMatch && typeMatch;
    });
  }, [statusTab, typeFilter, taskStatuses, myTaskIds]);

  const clientById = useMemo(()=> Object.fromEntries(CLIENTS.map(c=>[c.id,c])), []);
  const pendingCount = myTasks.filter(t=>(taskStatuses[t.id]??t.status)!=='done').length;
  const doneCount = myTasks.filter(t=>(taskStatuses[t.id]??t.status)==='done').length;

  return (
    <div className="flex flex-col h-screen overflow-hidden">
      <header className="shrink-0 px-6 py-4 bg-white border-b border-gray-100">
        <div className="flex items-center justify-between mb-3">
          <div>
            <h1 className="text-lg font-bold">Мои задачи</h1>
            <p className="text-xs text-gray-400">Асель К. · {pendingCount} активных · {doneCount} выполнено</p>
          </div>
          <div className="flex gap-1.5">
            {['active','done'].map(s=>(
              <button key={s} onClick={()=>setStatusTab(s)}
                className={`px-4 py-1.5 text-sm font-medium rounded-lg transition-colors ${statusTab===s?'bg-brand-500 text-white':'text-gray-600 hover:bg-gray-100'}`}>
                {s==='active'?`Активные (${pendingCount})`:`Выполнено (${doneCount})`}
              </button>
            ))}
          </div>
        </div>
        <div className="flex gap-1.5">
          {[['all','Все'],['reactivation','Реактивация'],['upsell','Апселл'],['analysis','Анализ'],['inventory','Остатки'],['general','Общее']].map(([v,l])=>(
            <button key={v} onClick={()=>setTypeFilter(v)}
              className={`px-3 py-1 text-xs font-medium rounded-lg transition-colors ${typeFilter===v?'bg-gray-800 text-white':'text-gray-500 hover:bg-gray-100'}`}>
              {v!=='all' && <span className="mr-1">{TYPE[v]?.icon}</span>}{l}
            </button>
          ))}
        </div>
      </header>

      <div className="flex-1 overflow-y-auto px-6 py-4 space-y-2.5">
        {myTaskIds.size===0 && (
          <div className="text-center py-20 text-gray-400">
            <div className="text-5xl mb-3">📋</div>
            <p className="font-medium text-gray-700 mb-1">Нет личных задач</p>
            <p className="text-sm">Перейдите в «Все задачи» и нажмите «+ В мои задачи»</p>
          </div>
        )}
        {myTaskIds.size>0 && filtered.length===0 && (
          <div className="text-center py-20 text-gray-400">
            <div className="text-5xl mb-3">🎉</div>
            <p className="font-medium">Все задачи выполнены!</p>
          </div>
        )}
        {filtered.map(task => {
          const c = clientById[task.clientId];
          const tt = TYPE[task.type];
          const pp = PRI[task.pri];
          const st = getStatus(task);
          return (
            <div key={task.id} className={`bg-white border rounded-xl p-4 flex gap-4 hover:shadow-sm transition-shadow ${task.pri==='high'&&st!=='done'?'border-orange-200':'border-gray-200'}`}>
              <div className="pt-1 shrink-0">
                <div className={`w-2.5 h-2.5 rounded-full ${pp?.dot}`}/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 flex-wrap mb-1">
                  <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${tt?.cls}`}>{tt?.icon} {tt?.label}</span>
                  {c && <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${SEG[c.seg]?.cls}`}>{c.seg}</span>}
                  {task.pri==='high' && st!=='done' && <span className="text-xs text-red-500 font-medium">🔴 Срочно</span>}
                  <span className="text-xs text-gray-400 ml-auto">до {task.due}</span>
                </div>
                {c && <button onClick={()=>onViewClient(c)} className="text-xs text-brand-600 hover:underline mb-1 font-medium text-left">{c.name}</button>}
                <p className="text-sm font-semibold text-gray-900 mb-1">{task.title}</p>
                <p className="text-xs text-gray-500 leading-relaxed line-clamp-2">{task.desc}</p>
                {c && c.churn>0.6 && <div className="mt-2 text-xs text-orange-700 bg-orange-50 rounded px-2 py-1">⚠️ Churn {Math.round(c.churn*100)}% · {c.days} дн. без заказа</div>}
              </div>
              <div className="shrink-0 flex flex-col gap-1.5 items-end">
                {st!=='done' ? (
                  <>
                    <button onClick={()=>{ onOpenClient(c); }}
                      className="px-3 py-1.5 text-xs font-medium text-brand-600 border border-brand-200 rounded-lg hover:bg-brand-500 hover:text-white transition-colors whitespace-nowrap">
                      Открыть в чате →
                    </button>
                    <button onClick={()=>setStatus(task.id,'done')}
                      className="px-3 py-1.5 text-xs font-medium text-green-600 border border-green-200 rounded-lg hover:bg-green-500 hover:text-white transition-colors">
                      ✓ Выполнено
                    </button>
                    {st==='pending' && (
                      <button onClick={()=>setStatus(task.id,'in_progress')}
                        className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 transition-colors">
                        В работу
                      </button>
                    )}
                    <button onClick={()=>unclaim(task.id)}
                      className="px-3 py-1.5 text-xs text-gray-400 hover:text-red-500 transition-colors">
                      ← Убрать из моих
                    </button>
                  </>
                ) : (
                  <>
                    <button onClick={()=>setStatus(task.id,'pending')}
                      className="px-3 py-1.5 text-xs text-gray-400 hover:text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                      Вернуть
                    </button>
                    <button onClick={()=>unclaim(task.id)}
                      className="px-3 py-1.5 text-xs text-gray-400 hover:text-red-500 transition-colors">
                      ← Убрать из моих
                    </button>
                  </>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

          </div>
        </div>

        {/* Tasks */}
        <div className="bg-white border border-gray-200 rounded-xl overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-100 flex items-center justify-between">
            <p className="text-sm font-semibold">Задачи клиента</p>
            <div className="flex gap-1">
              {[['active',`Активные (${activeTasks.length})`],['done',`Выполнено (${doneTasks.length})`]].map(([id,label])=>(
                <button key={id} onClick={()=>setTaskTab(id)}
                  className={`px-3 py-1 text-xs font-medium rounded-lg transition-colors ${taskTab===id?'bg-brand-500 text-white':'text-gray-500 hover:bg-gray-100'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>
          <div className="divide-y divide-gray-50">
            {displayTasks.length===0 && (
              <div className="px-4 py-10 text-center text-gray-400 text-sm">
                {taskTab==='active' ? '✅ Все задачи выполнены' : 'Нет выполненных задач'}
              </div>
            )}
            {displayTasks.map(task=>{
              const tt = TYPE[task.type];
              const pp = PRI[task.pri];
              const st = getStatus(task);
              return (
                <div key={task.id} className={`px-4 py-3 flex items-start gap-3 ${task.pri==='high'&&st!=='done'?'bg-orange-50/30':''}`}>
                  <div className={`w-2 h-2 rounded-full mt-2 shrink-0 ${pp?.dot}`}/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 flex-wrap mb-0.5">
                      <span className={`text-xs px-1.5 py-0.5 rounded font-medium ${tt?.cls}`}>{tt?.icon} {tt?.label}</span>
                      {task.pri==='high' && st!=='done' && <span className="text-xs text-red-500 font-medium">🔴 Срочно</span>}
                      <span className="text-xs text-gray-400 ml-auto">до {task.due}</span>
                    </div>
                    <p className="text-sm font-semibold text-gray-900">{task.title}</p>
                    <p className="text-xs text-gray-500 leading-relaxed mt-0.5">{task.desc}</p>
                  </div>
                  {st!=='done' && (
                    <button onClick={()=>onOpenChat(client)}
                      className="shrink-0 px-3 py-1.5 text-xs font-medium text-brand-600 border border-brand-200 rounded-lg hover:bg-brand-500 hover:text-white transition-colors whitespace-nowrap">
                      В чате →
                    </button>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Quick actions */}
        <div className="bg-white border border-gray-200 rounded-xl p-4">
          <p className="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Быстрые действия</p>
          <div className="flex flex-wrap gap-2">
            {Object.entries(TYPE).map(([key,meta])=>(
              <button key={key} onClick={()=>onOpenChat(client)}
                className={`flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg border transition-colors ${meta.cls} border-current hover:opacity-80`}>
                {meta.icon} {meta.label}
              </button>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ page, setPage, myTaskCount }) {
  const pendingCount = TASKS.filter(t=>t.status!=='done').length;
  const criticalCount = CLIENTS.filter(c=>c.churn>0.8).length;
  const nav = [
    { id:'all-tasks',  icon:'📋', label:'Все задачи',    badge:pendingCount },
    { id:'my-tasks',   icon:'✅', label:'Мои задачи',    badge:myTaskCount||null },
    { id:'chat',       icon:'💬', label:'Чат с AI',       badge:null },
    { id:'analytics',  icon:'📊', label:'Аналитика',      badge:null },
    { id:'goals',      icon:'🎯', label:'Цели на неделю', badge:null },
    { id:'settings',   icon:'⚙️', label:'Настройки',      badge:null },
  ];
  return (
    <aside className="w-56 shrink-0 bg-white border-r border-gray-200 flex flex-col h-screen">
      <div className="px-4 py-4 border-b border-gray-100">
        <div className="flex items-center gap-2.5">
          <div className="w-8 h-8 rounded-lg bg-brand-500 flex items-center justify-center text-white font-bold text-sm shrink-0">AI</div>
          <div className="min-w-0">
            <p className="text-sm font-bold text-gray-900 leading-tight truncate">AI Sales Director</p>
            <p className="text-xs text-gray-400">ХБК «Аксай»</p>
          </div>
        </div>
      </div>
      <nav className="px-3 py-3 flex-1">
        {nav.map(({id,icon,label,badge})=>(
          <button key={id} onClick={()=>setPage(id)}
            className={`w-full text-left flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-sm font-medium mb-0.5 transition-colors relative
              ${page===id?'bg-brand-50 text-brand-600':'text-gray-600 hover:bg-gray-50'}`}>
            <span className="text-base leading-none">{icon}</span>
            <span className="flex-1">{label}</span>
            {badge!=null && badge>0 && (
              <span className={`text-xs font-bold px-1.5 py-0.5 rounded-full ${page===id?'bg-brand-500 text-white':'bg-gray-200 text-gray-600'}`}>{badge}</span>
            )}
          </button>
        ))}
      </nav>
      <div className="px-4 py-3 border-t border-gray-100">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 rounded-full bg-brand-100 flex items-center justify-center text-brand-600 font-bold text-xs">А</div>
          <div className="min-w-0">
            <p className="text-xs font-medium text-gray-700 truncate">Асель К.</p>
            <p className="text-xs text-gray-400">Менеджер</p>
          </div>
        </div>
        {criticalCount>0 && (
          <div className="mt-2 text-xs text-red-700 bg-red-50 rounded-lg px-2 py-1.5">
            🚨 {criticalCount} клиентов — критический churn
          </div>
        )}
      </div>
    </aside>
  );
}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [page,         setPage]         = useState('all-tasks');
  const [client,       setClient]       = useState(null);
  const [modal,        setModal]        = useState(false);
  const [taskStatuses, setTaskStatuses] = useState({});
  const [myTaskIds,    setMyTaskIds]    = useState(new Set());
  const [clientView,   setClientView]   = useState(null);
  const { toasts, toast, rm } = useToast();

  const navigate = (p) => { setPage(p); setClientView(null); };

  const openClient = (c) => {
    setClient(c);
    setModal(false);
    setClientView(null);
    setPage('chat');
  };

  const openClientProfile = (c) => setClientView(c);

  const taskProps = { taskStatuses, setTaskStatuses, myTaskIds, setMyTaskIds };

  return (
    <div className="flex h-screen overflow-hidden bg-gray-50">
      <Sidebar page={page} setPage={navigate} myTaskCount={myTaskIds.size}/>
      <div className="flex-1 overflow-hidden">
        {clientView ? (
          <ClientPage client={clientView} onBack={()=>setClientView(null)} onOpenChat={openClient} taskStatuses={taskStatuses}/>
        ) : (<>
          {page==='all-tasks'  && <AllTasksPage onOpenClient={openClient} onViewClient={openClientProfile} {...taskProps}/>}
          {page==='my-tasks'   && <MyTasksPage  onOpenClient={openClient} onViewClient={openClientProfile} {...taskProps}/>}
          {page==='chat'       && <ChatPage toast={toast} client={client} setClient={setClient} onOpenModal={()=>setModal(true)}/>}
          {page==='analytics'  && <AnalyticsPage onViewClient={openClientProfile}/>}
          {page==='goals'      && <GoalsPage/>}
          {page==='settings'   && <SettingsPage/>}
        </>)}
      </div>
      <ClientModal isOpen={modal} onClose={()=>setModal(false)} onSelect={openClient} onViewClient={openClientProfile}/>
      <Toasts toasts={toasts} rm={rm}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
